<!DOCTYPE html>
<html lang="de" class="bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Coach</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="min-h-screen font-sans antialiased">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                FITNESS<span class="text-white font-light">.AI</span>
            </h1>
            <span class="px-3 py-1 text-xs font-semibold bg-emerald-500/10 text-emerald-400 rounded-full border border-emerald-500/20">
                Groq AI Connected
            </span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12">
        <section class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">
                Dein personalisierter <br class="hidden sm:inline">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">KI-Trainingsplan</span>
            </h2>
            <p class="text-gray-400 text-lg max-w-xl mx-auto">
                Erstellt in Echtzeit durch künstliche Intelligenz, perfekt abgestimmt auf deine persönlichen Daten.
            </p>
        </section>

        <!-- Eingabeformular -->
        <form id="fitness-form" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 md:p-8 shadow-xl mb-12">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-emerald-400 rounded-full"></span> Körperwerte & Ziele
            </h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Gewicht (kg)</label>
                    <input type="number" id="weight" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400 transition-colors" placeholder="z.B. 80">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Größe (cm)</label>
                    <input type="number" id="height" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400 transition-colors" placeholder="z.B. 180">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Aktivitätslevel</label>
                    <select id="activity" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400 transition-colors">
                        <option value="low">Wenig Bewegung (Bürojob)</option>
                        <option value="moderate">Moderat (1-3 Mal Sport/Woche)</option>
                        <option value="high">Sehr aktiv (Täglich Sport)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Dein primäres Ziel</label>
                    <select id="goal" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-emerald-400 transition-colors">
                        <option value="muscle">Muskelaufbau</option>
                        <option value="fat_loss">Fettverbrennung</option>
                        <option value="cardio">Ausdauer</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-400 hover:to-cyan-400 text-black font-bold py-4 px-6 rounded-xl transition-all shadow-lg shadow-emerald-500/10 hover:shadow-emerald-400/20 active:scale-[0.>
                Trainingsplan mit KI generieren
            </button>
        </form>

        <!-- Ausgabe-Bereich -->
        <section class="space-y-6">
            <h3 class="text-xl font-bold flex items-center gap-2">
                <span class="w-2 h-6 bg-cyan-400 rounded-full"></span> Dein generierter Plan
            </h3>

            <div class="bg-gray-900/60 border border-gray-800/80 rounded-2xl p-6 backdrop-blur-sm whitespace-pre-wrap leading-relaxed text-gray-200" id="result">
                Dein Plan erscheint hier, sobald du das Formular absendest...
            </div>
        </section>
    </main>

    <footer class="border-t border-gray-900 bg-gray-950 py-8 text-center text-sm text-gray-600 mt-20">
        &copy; 2026 FITNESS.AI Backend connected via MariaDB & Groq API.
    </footer>

    <script>
        document.getElementById('fitness-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "KI generiert Plan... Bitte warten...";

            const payload = {
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                activity: document.getElementById('activity').value,
                goal: document.getElementById('goal').value
            };

            try {
                // Präzise Verbindung über Ihre vollständige IP-Adresse
                const response = await fetch('http://108.142.232', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                resultDiv.innerText = data.plan;
            } catch (error) {
                resultDiv.innerText = "Fehler bei der Verbindung zum Backend.";
            }
        });
    </script>
</body>
</html>
