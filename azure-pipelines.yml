trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: UsePythonVersion@0
  displayName: 'Python bereitstellen'
  inputs:
    versionSpec: '3.x'

- script: |
    pip install -r requirements.txt
  displayName: 'requirements.txt validieren'

- script: |
    echo "Installiere Ansible und sshpass auf dem Build-Agent..."
    sudo apt-get update && sudo apt-get install -y sshpass
    pip install ansible
    
    echo "Führe Ansible Deployment DIREKT auf der Azure VM aus..."
    PLAYBOOK_PATH=$(find . -name "deploy.yml" | head -n 1)
    
    # ⚠️ TRAGE HIER DEINE ECHTE ÖFFENTLICHE VM-IP AUS DEM AZURE-PORTAL EIN:
    VM_IP="DEINE_ECHTE_AZURE_VM_IP" 
    
    # Ansible-Befehl mit Passwort-Authentifizierung und API-Key Übergabe
    ansible-playbook -i "$VM_IP," $PLAYBOOK_PATH \
      --extra-vars "openai_api_key=$OPENAI_SECRET" \
      --remote-user "azureuser" \
      --ansible-ssh-pass "$VM_PASS" \
      -e "ansible_ssh_pass=$VM_PASS"
  displayName: 'Ansible Deployment via Bash ausfuehren'
  env:
    # Hier mappen wir deine Azure DevOps Secrets sicher auf die Umgebungsvariablen
    OPENAI_SECRET: $(OPENAI_API_KEY)
    VM_PASS: $(VM_PASSWORD)
