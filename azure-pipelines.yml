trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: UsePythonVersion@0
  displayName: 'Python bereitstellen'
  inputs:
    versionSpec: '3.x'

- script: |
    pip install -r requirements.txt
  displayName: 'requirements.txt validieren'

# Hier nutzen wir den offiziellen Task, übergeben aber den Pfad absolut korrekt!
- task: Ansible@0
  displayName: 'Ansible Deployment auf Azure VM ausfuehren'
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: '$(Build.SourcesDirectory)/Ansible/deploy.yml'
    inventoriesAgentMachine: 'noInventory'
    args: '--extra-vars "openai_api_key=$(OPENAI_API_KEY)"'
