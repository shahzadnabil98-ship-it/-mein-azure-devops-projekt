---
- name: Datenbank-Backup für Fitness-App erstellen
  hosts: fitness_server
  become: yes
  vars:
    backup_dir: "/var/backups/fitness_db"

  tasks:
    - name: Backup-Verzeichnis sicherstellen
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0777'

    - name: Datenbank exportieren (Beispiel PostgreSQL)
      community.postgresql.postgresql_db:
        state: dump
        name: fitness_db
        target: "{{ backup_dir }}/db_backup_{{ ansible_facts['date_time']['date'] }}.sql"
        login_user: postgres
        login_host: localhost

    - name: Backup in Azure Blob Storage hochladen
      azure.azcollection.azure_rm_storageblob:
        resource_group: "DeineResourceGroup"
        storage_account: "DeinStorageAccount"
        container: "database-backups"
        blob: "db_backup_{{ ansible_facts['date_time']['date'] }}.sql"
        src: "{{ backup_dir }}/db_backup_{{ ansible_facts['date_time']['date'] }}.sql"
