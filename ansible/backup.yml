---
- name: Datenbank-Backup für Fitness-App erstellen
  hosts: fitness_server
  become: yes
  vars:
    backup_dir: "/var/backups/fitness_db"
    date: "{{ ansible_date_time.date }}"

  tasks:
    - name: Backup-Verzeichnis sicherstellen
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'

    - name: PyMySQL Paket für Ansible installieren
      ansible.builtin.apt:
        name: python3-pymysql
        state: present
        update_cache: yes

    - name: Datenbank exportieren (MySQL)
      community.mysql.mysql_db:
        state: dump
        name: fitness_db
        target: "{{ backup_dir }}/db_backup_{{ date }}.sql"
        # 🔑 HIER DIE ZUGANGSDATEN DEINER DATENBANK EINTRAGEN:
        login_user: "root"                     # Oder Ihr spezifischer DB-Nutzer
        login_password: "Shahzad-1998" # Tragen Sie hier das Passwort für die DB ein

    - name: Backup via Azure CLI mit Account Key hochladen
      ansible.builtin.shell: |
        az storage blob upload \
          --account-name "fitnessbackupnabil" \
          --container-name "database-backups" \
          --file "{{ backup_dir }}/db_backup_{{ date }}.sql" \
          --name "db_backup_{{ date }}.sql" \
          --account-key "{{ lookup('env', 'STORAGE_KEY') }}"
