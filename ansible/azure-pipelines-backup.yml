schedules:
- cron: "0 9 * * *" # 09:00 Uhr UTC entspricht 11:00 Uhr deutscher Zeit
  displayName: Tägliches Backup um 11:00 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Ansible@0
  inputs:
    ansibleInterface: 'remoteMachine'
    ansibleEndpoint: 'fitness-server-ssh' # Dein genauer Name der Service Connection
    playbookPathOnAgentMachine: 'ansible/backup.yml'
    inventoriesAgentMachine: 'file'
    inventoryFileOnAgentMachine: 'ansible/hosts'
    failOnStdErr: true
