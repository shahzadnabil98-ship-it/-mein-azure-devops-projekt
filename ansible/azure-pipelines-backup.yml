trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: UsePythonVersion@0
  displayName: 'Python bereitstellen'
  inputs:
    versionSpec: '3.x'

- script: |
    pip install -r requirements.txt
  displayName: 'requirements.txt validieren'

- script: |
    echo "Installiere Ansible auf dem Build-Agent..."
    pip install ansible
    
    echo "Führe Ansible Deployment DIREKT auf der Azure VM aus..."
    PLAYBOOK_PATH=$(find . -name "deploy.yml" | head -n 1)
    
    # ⚠️ WICHTIG: Ersetze '1.2.3.4' mit der echten IP-Adresse deiner Azure-VM!
    # (Alternativ, falls du einen SSH-Key nutzt, füge diesen hier temporär hinzu)
    VM_IP="108.142.232.149"
    
    # Wir sagen Ansible, dass es die VM als Ziel nutzen soll (-i) 
    # und übergeben den Admin-User 'azureuser'
    ansible-playbook -i "$VM_IP," $PLAYBOOK_PATH \
      --extra-vars "openai_api_key=$API_KEY_SECRET" \
      --remote-user "azureuser" \
      --private-key "~/.ssh/id_rsa" # Pfad zu deinem SSH-Key, falls vorhanden
  displayName: 'Ansible Deployment via Bash ausfuehren'
  env:
    API_KEY_SECRET: $(OPENAI_API_KEY)
