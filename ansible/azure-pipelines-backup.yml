  # ... (Deine bisherigen Steps für SSH und Ansible bleiben unverändert) ...

- task: DownloadSecureFile@1
  displayName: 'Lade den SSH-Key für den Datei-Download'
  inputs:
    secureFile: 'id_rsa' # Falls du den Key in Azure DevOps Secure Files hochgeladen hast

- script: |
    # Das fertige Backup vom Server auf den Azure DevOps Agenten kopieren
    scp -i $(Agent.TempDirectory)/id_rsa azureuser@108.142.232.149:/var/backups/fitness_db/db_backup_$(date +%Y-%m-%d).sql $(Build.ArtifactStagingDirectory)/
  displayName: 'Backup-Datei vom Server herunterladen'

- task: AzureFileCopy@4
  displayName: 'Backup in Azure Blob Storage hochladen'
  inputs:
    SourcePath: '$(Build.ArtifactStagingDirectory)/db_backup_*.sql'
    azureSubscription: 'DEINE_AZURE_SERVICE_CONNECTION' # Name deiner Azure-Verbindung in DevOps
    Destination: 'AzureBlob'
    storage: 'DeinStorageAccount'
    ContainerName: 'database-backups'

