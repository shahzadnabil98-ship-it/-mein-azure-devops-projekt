schedules:
- cron: "0 9 * * *"
  displayName: Tägliches Backup um 11:00 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Ansible@0
  inputs:
    ansibleInterface: 'remoteMachine'
    connectionOverSsh: 'fitness-server-ssh'
    sshEndpoint: 'fitness-server-ssh'
    playbookPathLinkedArtifactOnRemoteMachine: 'ansible/backup.yml' # Geändertes Feld!
    inventoriesAgentMachine: 'file'
    inventoryFileOnAgentMachine: 'ansible/hosts'
    failOnStdErr: true



