schedules:
- cron: "30 9 * * *" # 09:30 Uhr UTC entspricht exakt 11:30 Uhr deutscher Zeit
  displayName: Automatisches Backup um 11:30 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'

# 🔐 Lädt die sichere Variablengruppe aus der Library für den Upload
