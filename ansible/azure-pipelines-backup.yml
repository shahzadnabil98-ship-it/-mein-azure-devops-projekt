schedules:
- cron: "15 9 * * *" # 09:15 Uhr UTC entspricht 11:15 Uhr deutscher Zeit
  displayName: Test-Backup um 11:15 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Ansible@0
  inputs:
    ansibleInterface: 'remoteMachine'
    connectionOverSsh: true
    sshEndpoint: 'fitness-server-ssh'
    playbookPathOnAgentMachine: 'ansible/backup.yml'
    inventoriesAgentMachine: 'file'
    inventoryFileOnAgentMachine: 'ansible/hosts'
    failOnStdErr: true
