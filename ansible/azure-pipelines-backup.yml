schedules:
- cron: "25 6 * * *" # 06:25 Uhr UTC entspricht 08:25 Uhr deutscher Zeit (Sommerzeit)
  displayName: Tägliches Backup um 08:25 Uhr
  branches:
    include:
    - main
  always: true

trigger: none # Verhindert automatischen Start bei Code-Push

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Ansible@0
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: 'ansible/backup.yml'
    inventoriesAgentMachine: 'file'
    inventoryFileOnAgentMachine: 'ansible/hosts'
    failOnStdErr: true
