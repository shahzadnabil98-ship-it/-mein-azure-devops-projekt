schedules:
- cron: "0 9 * * *" # 09:00 Uhr UTC entspricht 11:00 Uhr deutscher Zeit
  displayName: Test-Backup um 11:00 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'
- task: Ansible@0
  inputs:
    ansibleInterface: 'remoteMachine'
    connectionOverSsh: 'fitness-server-ssh'
    playbookSourceRemoteMachine: 'agentMachine'
    playbookRootRemoteMachine: 'ansible'
    playbookPathLinkedArtifactOnRemoteMachine: 'backup.yml'
    inventoriesRemoteMachine: 'file'
    inventoryFileSourceRemoteMachine: 'agentMachine'
    inventoryFileLinkedArtifactOnRemoteMachine: 'ansible/hosts'


