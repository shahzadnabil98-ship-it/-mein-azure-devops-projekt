schedules:
- cron: "45 7 * * *" # 07:45 Uhr UTC entspricht 09:45 Uhr deutscher Zeit
  displayName: Test-Backup um 09:45 Uhr
  branches:
    include:
    - main
  always: true

trigger: none

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Ansible@0
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: 'ansible/backup.yml'
    inventoriesAgentMachine: 'file'
    inventoryFileOnAgentMachine: 'ansible/hosts'
    failOnStdErr: true
