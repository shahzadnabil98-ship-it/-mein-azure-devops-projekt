---
- name: Deployment der Fitness Webapp auf Azure VM
  hosts: all
  gather_facts: false

  tasks:
    - name: Definiere Projektverzeichnis auf der VM
      ansible.builtin.set_fact:
        project_dir: "/home/azureuser/fitness_app"

    - name: Erstelle Projektverzeichnis falls nicht existent
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'

    - name: Kopiere Webapp-Dateien auf die Azure VM
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ project_dir }}/"
        mode: '0644'
      loop:
        - "../app.py"
        - "../requirements.txt"

    - name: Erstelle den von Flask benoetigten templates-Ordner auf der VM
      ansible.builtin.file:
        path: "{{ project_dir }}/templates"
        state: directory
        mode: '0755'

    - name: Kopiere die index.html in den templates-Ordner auf der VM
      ansible.builtin.copy:
        src: "../index.html"
        dest: "{{ project_dir }}/templates/index.html"
        mode: '0644'

    - name: Installiere Python-Abhaengigkeiten auf der VM
      ansible.builtin.shell: |
        pip3 install -r requirements.txt
      args:
        chdir: "{{ project_dir }}"

    - name: Pruefe ob Flask bereits laeuft und beende es (Port 5000)
      ansible.builtin.shell: "fuser -k 5000/tcp || true"

    - name: Flask Server im Hintergrund starten
      ansible.builtin.shell: "nohup python3 app.py > flask.log 2>&1 &"
      args:
        chdir: "{{ project_dir }}"
