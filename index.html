<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>KI Fitness Coach</title>
    <!-- Wir binden Tailwind CSS direkt über das CDN für modernes Design ein -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
        <h1 class="text-3xl font-extrabold text-center mb-6 text-emerald-400">🤖 KI Fitness & Ernährungs-Planer</h1>
        
        <form id="fitnessForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Gewicht (kg)</label>
                <input type="number" id="weight" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" value="80" required>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Größe (cm)</label>
                <input type="number" id="height" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" value="180" required>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Aktivität</label>
                <select id="activity" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white">
                    <option value="3x die Woche Gym">3x die Woche Gym</option>
                    <option value="Wenig Bewegung">Wenig Bewegung / Büro</option>
                    <option value="Täglich Sport">Täglich Sport</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Ziel</label>
                <input type="text" id="goal" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-2.5 text-white" value="Muskelaufbau" required>
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 font-bold p-3 rounded-lg transition duration-200 cursor-pointer">Plan generieren 🔥</button>
        </form>

        <!-- Ausgabebereich für die KI-Antwort -->
        <div id="output" class="mt-8 hidden p-4 bg-gray-750 border border-gray-600 rounded-lg">
            <h2 class="text-xl font-bold text-emerald-400 mb-3">Dein generierter Plan:</h2>
            <div id="planResult" class="text-sm whitespace-pre-line text-gray-300"></div>
        </div>
    </div>

    <script>
        // Sendet die eingegebenen Daten per API an Ihr Python-Backend
        document.getElementById('fitnessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const outputDiv = document.getElementById('output');
            const resultDiv = document.getElementById('planResult');
            
            resultDiv.innerText = "Die KI berechnet deinen Plan... Bitte warten...";
            outputDiv.classList.remove('hidden');

            const payload = {
                weight: document.getElementById('weight').value,
                height: document.getElementById('height').value,
                activity: document.getElementById('activity').value,
                goal: document.getElementById('goal').value
            };

            try {
                const response = await fetch('/api/generate-plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                resultDiv.innerText = data.plan;
            } catch (error) {
                resultDiv.innerText = "Fehler bei der Verbindung zum Backend.";
            }
        });
    </script>
</body>
</html>
